<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ARCHIVE | PORTFOLIO</title>
    <link rel="stylesheet" href="CSS/style.css">
    <style>
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 9 / 16;
            background-color: #000;
            border-radius: 25px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .video-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: 0.5s;
        }

        .grid-item:hover .video-container {
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(138, 154, 91, 0.2);
        }

        .grid-item:hover .video-thumbnail {
            opacity: 1;
            transform: scale(1.05);
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            color: white;
            z-index: 2;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(0,0,0,0.3);
            opacity: 0.9;
        }

        /* 텍스트 스타일 보완 */
        .archive-title {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--dark-sage);
            line-height: 1.4;
            word-break: keep-all;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">PORTFOLIO.</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li class="dropdown">
                <a href="project.html">Work</a>
                <ul class="dropdown-content">
                    <li><a href="project.html#digital">Digital Heritage</a></li>
                </ul>
            </li>
            <li class="dropdown">
                <a href="archive.html">Archive</a>
                <ul class="dropdown-content">
                    <li><a href="#shorts">Shortform</a></li>
                </ul>
            </li>
            <li><a href="connect.html">Contact</a></li>
        </ul>
    </nav>

    <main class="container">
        <h2 style="font-size: 3rem; font-weight: 300;">Visual Archive</h2>
        <div class="stitch-line"></div>
        
        <div class="grid" id="shorts" style="grid-template-columns: repeat(3, 1fr); align-items: start; gap: 40px;">
            
            <div class="grid-item">
                <div class="video-container" onclick="openVideo('in8_mCAscmI')">
                    <img src="https://img.youtube.com/vi/in8_mCAscmI/maxresdefault.jpg" alt="Thumbnail 01" class="video-thumbnail">
                    <div class="play-icon">▶</div>
                </div>
                <h3 class="archive-title">이천시 AI 공모전 장려상 수상</h3>
            </div>

            <div class="grid-item" style="margin-top: -40px;">
                <div class="video-container" onclick="openVideo('q_ZDfCUv2e4')">
                    <img src="https://img.youtube.com/vi/q_ZDfCUv2e4/maxresdefault.jpg" alt="Thumbnail 02" class="video-thumbnail">
                    <div class="play-icon">▶</div>
                </div>
                <h3 class="archive-title">땡겨요 숏폼 공모전 우수상 수상</h3>
            </div>

            <div class="grid-item" style="margin-top: 40px;">
                <div class="video-container" onclick="openVideo('E2IgAXn6g2o')">
                    <img src="https://img.youtube.com/vi/E2IgAXn6g2o/maxresdefault.jpg" alt="Thumbnail 03" class="video-thumbnail">
                    <div class="play-icon">▶</div>
                </div>
                <h3 class="archive-title">당근도넛&샌드위치 AI 캐릭터 활용 홍보 영상</h3>
            </div>

        </div>
    </main>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; top:-40px; right:0; color:white; font-size:2.5rem; cursor:pointer;" onclick="closeVideo()">&times;</span>
            <iframe id="videoPlayer" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function openVideo(id) {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('videoPlayer');
            player.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('videoPlayer');
            player.src = "";
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('videoModal')) closeVideo();
        }
    </script>
</body>
</html>
