<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME | PORTFOLIO</title>
    <link rel="stylesheet" href="CSS/style.css">
    <style>
        /* 메인 섹션 전용 레이아웃 및 모션 스타일 */
        .hero-content {
            display: flex;
            justify-content: flex-start; /* 왼쪽 기준으로 정렬 */
            align-items: flex-end; /* 하단 기준 정렬 */
            gap: 2.5rem; /* 이미지와 텍스트 사이 간격 축소 */
            margin: 4rem 0;
        }

        .hero-text-side {
            flex: 1;
            padding-bottom: 2rem; /* 이미지와 높이 밸런스 조정 */
        }

        .main-slogan {
            font-size: 3rem; /* 크기 축소 */
            font-weight: 300;
            line-height: 1.2;
            margin-bottom: 2.5rem;
            color: var(--dark-sage);
        }

        .intro-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--sub-text);
            word-break: keep-all;
        }

        /* 이미지 컨테이너: 왼쪽으로 이동 및 너비 조정 */
        .main-visual-side {
            flex: 0 0 350px; /* 이미지 너비 약간 축소 */
            margin-left: -1rem; /* 왼쪽으로 미세하게 더 이동 */
        }

        /* 이미지 모달 및 애니메이션 스타일 */
        .visual-container {
            width: 100%;
            aspect-ratio: 9 / 16;
            border-radius: 40px;
            overflow: hidden;
            background-color: var(--white);
            
            /* 초기 그림자 설정: 은은하게 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            
            /* 부드러운 전환 효과 설정 */
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.6s ease;
        }

        .visual-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            
            /* 이미지 자체에도 부드러운 전환 효과 추가 */
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* 커서를 올렸을 때 (Hover) 모션 효과 */
        .main-visual-side:hover .visual-container {
            /* 위로 살짝 떠오르는 효과 */
            transform: translateY(-15px);
            
            /* 세이지 그린 톤의 그림자 강화 */
            box-shadow: 0 25px 50px rgba(138, 154, 91, 0.15);
        }

        .main-visual-side:hover .visual-container img {
            /* 이미지 자체가 미세하게 확대되는 효과 */
            transform: scale(1.03);
        }

        /* 모바일 대응 */
        @media (max-width: 900px) {
            .hero-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 3rem;
            }
            .hero-text-side { padding-bottom: 0; }
            .main-visual-side { flex: 0 0 auto; width: 100%; max-width: 320px; margin-left: 0; }
            .main-slogan { font-size: 2.2rem; }
            
            /* 모바일에서는 호버 효과 제외 (터치 디바이스 고려) */
            .main-visual-side:hover .visual-container {
                transform: none;
                box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            }
            .main-visual-side:hover .visual-container img {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">PORTFOLIO.</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li class="dropdown">
                <a href="project.html" class="dropbtn">Work</a>
                <ul class="dropdown-content">
                    <li><a href="project.html#digital">Digital Heritage</a></li>
                    <li><a href="project.html#ai">AI Content</a></li>
                </ul>
            </li>
            <li class="dropdown">
                <a href="archive.html" class="dropbtn">Archive</a>
                <ul class="dropdown-content">
                    <li><a href="archive.html#shorts">Shortform</a></li>
                    <li><a href="archive.html#lab">Visual Lab</a></li>
                </ul>
            </li>
            <li><a href="connect.html">Contact</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="stitch-line"></div>

        <section class="hero-content">
            
            <div class="hero-text-side">
                <h1 class="main-slogan">
                    Exploring the world with <b>AI</b>,<br>
                    Creating <b>Digital Heritage</b>.
                </h1>
                <p class="intro-text">
                    최신 AI 기술을 도구 삼아 상상을 현실로 바꿉니다. 🌿<br>
                    빠른 템포와 감각적인 비주얼을 통해 새로운 가치를 제안합니다.
                </p>
            </div>

            <div class="main-visual-side">
                <div class="visual-container">
                    <img src="IMAGES/1.png" alt="Main Visual">
                </div>
            </div>

        </section>

        <div class="stitch-line" style="margin-top: 5rem;"></div>
    </main>

    <script src="JS/main.js"></script>
</body>
</html>
